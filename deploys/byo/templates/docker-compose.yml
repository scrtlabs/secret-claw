# OpenClaw BYO SecretVM deploy template.
#
# Single-service shape, modeled on the production amethyst-eel deployment that
# SecretVM has been running healthily for >24h. Differences:
#   - The seed script is delivered via a `configs:` block (rewriter-preserves
#     `content: |` verbatim, unlike `command:` block scalars which the
#     rewriter converts |->>) and base64-decodes per-user files into the
#     state volume on first boot.
#   - No `--allow-unconfigured` because seeding always produces a valid
#     openclaw.json before the gateway boots.
#   - We override the image entrypoint with `sh /etc/openclaw-seed.sh` so the
#     seed runs as root; the seed itself drops privs to user `node` (uid 1000)
#     via `runuser` before exec'ing tini + node openclaw.mjs.
#
# HTTPS / Traefik:
#   We declare the Traefik sidecar, network, labels, and TLS config block
#   ourselves — modeled byte-for-byte on what the SecretAI portal's "HTTPS"
#   toggle injects when an operator clicks the slider on the create-VM form.
#   Empirically the rewriter does NOT add Traefik for arbitrary compose
#   uploads (an earlier assumption in this file; corrected May 20 2026 after
#   comparing portal-toggle-on vs toggle-off compose outputs).
#
#   `$DOMAIN_NAME` in the Traefik router rule is a placeholder the SecretVM
#   platform substitutes with the assigned VM hostname when staging the
#   compose for deploy. Cert material is read from /mnt/secure/cert/, which
#   the platform mounts read-only at boot.
#
# SecretVM compose rewriter still:
#   - Injects `env_file: - usr/.env`. The vars in that file are SecretVM
#     scaffolding (id_tx_io etc.) and do not collide with our env.
#
# See README.md for the rendering and deploy flow.

x-openclaw-image: &openclaw-image
  ghcr.io/openclaw/openclaw@sha256:e2482a66682de6f540dcfd9921e410c23fd060dcd441382ff952247ee911a672

services:
  openclaw-gateway:
    image: *openclaw-image
    container_name: openclaw-gateway-__DEPLOYMENT_ID_SHORT__
    user: "0:0"
    environment:
      HOME: /home/node
      OPENCLAW_HOME: /home/node
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      OPENCLAW_DISABLE_BONJOUR: "1"
      TZ: UTC
      TERM: xterm-256color
    volumes:
      - openclaw_state:/home/node/.openclaw
      - openclaw_auth_secrets:/home/node/.config/openclaw
    configs:
      - source: openclaw_seed
        target: /etc/openclaw-seed.sh
        mode: 0755
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:18789:18789"
    init: true
    restart: unless-stopped
    entrypoint:
      - sh
      - /etc/openclaw-seed.sh
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openclaw-gateway.rule=Host(`$DOMAIN_NAME`)"
      - "traefik.http.routers.openclaw-gateway.entrypoints=websecure"
      - "traefik.http.routers.openclaw-gateway.tls=true"
      - "traefik.http.routers.openclaw-gateway.priority=1000"
      - "traefik.http.services.openclaw-gateway.loadbalancer.server.port=18789"
      - "secret-claw.deployment_id=__DEPLOYMENT_ID__"

  traefik:
    image: traefik:v2.10
    command:
      - --api.insecure=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls.options=default@file
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
    ports:
      - 80:80
      - 443:443
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/secure/cert:/certs:ro
    networks:
      - traefik
    configs:
      - source: tls_config
        target: /etc/traefik/dynamic/tls.yml

volumes:
  openclaw_state:
  openclaw_auth_secrets:

networks:
  traefik:
    driver: bridge

configs:
  tls_config:
    content: |-
      tls:
        certificates:
          - certFile: /certs/secret_vm_fullchain.pem
            keyFile: /certs/secret_vm_private.pem
        stores:
          default:
            defaultCertificate:
              certFile: /certs/secret_vm_fullchain.pem
              keyFile: /certs/secret_vm_private.pem
  openclaw_seed:
    content: |
      #!/bin/sh
      # Seeds /home/node/.openclaw on first boot from base64 blobs rendered
      # into this script by scripts/render.py. Idempotent: if openclaw.json
      # already exists, skips the seed step. Paths are hardcoded (rather than
      # using a shell var) because docker-compose interpolates $-prefixed
      # tokens inside configs.content at parse time.
      set -eu
      if [ ! -f /home/node/.openclaw/openclaw.json ]; then
        echo "[seed] populating /home/node/.openclaw"
        mkdir -p /home/node/.openclaw/cron /home/node/.openclaw/agents/main/workspace /home/node/.openclaw/agents/routines/workspace /home/node/.openclaw/logs
        base64 -d > /home/node/.openclaw/openclaw.json <<'OPENCLAW_JSON_B64_EOF'
      __OPENCLAW_JSON_B64__
      OPENCLAW_JSON_B64_EOF
        base64 -d > /home/node/.openclaw/cron/jobs.json <<'CRON_JOBS_B64_EOF'
      __CRON_JOBS_B64__
      CRON_JOBS_B64_EOF
        base64 -d > /home/node/.openclaw/agents/main/workspace/AGENTS.md <<'AGENTS_MD_B64_EOF'
      __AGENTS_MD_B64__
      AGENTS_MD_B64_EOF
        base64 -d > /home/node/.openclaw/agents/main/workspace/IDENTITY.md <<'IDENTITY_MD_B64_EOF'
      __IDENTITY_MD_B64__
      IDENTITY_MD_B64_EOF
        base64 -d > /home/node/.openclaw/agents/main/workspace/SOUL.md <<'SOUL_MD_B64_EOF'
      __SOUL_MD_B64__
      SOUL_MD_B64_EOF
        base64 -d > /home/node/.openclaw/agents/main/workspace/USER.md <<'USER_MD_B64_EOF'
      __USER_MD_B64__
      USER_MD_B64_EOF
        # Substitute the assigned hostname into controlUi.allowedOrigins.
        # The renderer leaves __RUNTIME-VM-HOSTNAME__ (hyphens, not
        # underscores — see lib/render.ts for why) as a sentinel because
        # the SecretAI portal assigns the actual hostname only after
        # vm/create returns — too late for the renderer.
        #
        # $DOMAIN_NAME (single $) — compose interpolates this at
        # PARSE TIME on the SecretVM deploy host, before the script is
        # staged into the container. The HTTPS toggle's Traefik label
        # (Host(`$DOMAIN_NAME`)) uses the same mechanism and is the
        # proof it works on that host. By the time the seed runs, the
        # literal hostname is already baked into this line.
        #
        # $$VM_HOSTNAME (escaped) is a shell-time fallback for cases
        # where DOMAIN_NAME was unset at compose parse but the operator
        # populated usr/.env with VM_HOSTNAME (amethyst-eel convention).
        SC_HOST="$DOMAIN_NAME"
        [ -z "$$SC_HOST" ] && SC_HOST="$${VM_HOSTNAME:-}"
        if [ -n "$$SC_HOST" ]; then
          sed -i "s|__RUNTIME-VM-HOSTNAME__|$$SC_HOST|g" /home/node/.openclaw/openclaw.json
          echo "[seed] substituted hostname=$$SC_HOST into openclaw.json"
        else
          echo "[seed] WARN: compose-time DOMAIN_NAME and shell-time VM_HOSTNAME both empty; controlUi will reject browser requests" >&2
          echo "[seed] env candidates: $$(env | grep -iE 'host|domain|vm' | cut -d= -f1 | tr '\n' ',')" >&2
        fi
        chown -R 1000:1000 /home/node/.openclaw
        echo "[seed] done"
      else
        echo "[seed] /home/node/.openclaw/openclaw.json already present, skipping"
      fi
      exec runuser -u node -- tini -s -- node /app/openclaw.mjs gateway --bind lan --port 18789
